  <style>
    :root {
      --bg-dark: #061109;
      --bg-surface: #0a1f11;
      --primary: #10b981;
      --primary-hover: #34d399;
      --primary-glow: rgba(16, 185, 129, 0.2);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(16, 185, 129, 0.15);
      --glass-bg: rgba(10, 31, 17, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --transition-speed: 0.6s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
        linear-gradient(to bottom, #061109, #030805);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Header */
    header {
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      background: rgba(6, 17, 9, 0.5);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .brand .logo-icon {
      font-size: 32px;
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary-glow);
    }

    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 8px;
      padding-left: 8px;
      border-left: 1px solid rgba(255,255,255,0.2);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-icon {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-icon:hover {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
      box-shadow: 0 0 15px var(--primary-glow);
      transform: translateY(-2px);
    }

    /* Layout Main */
    .app-container {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    /* Side Panel */
    .side-panel {
      width: 320px;
      background: rgba(10, 31, 17, 0.85);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
      z-index: 5;
      transform: translateX(0);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .side-panel.collapsed {
      transform: translateX(-100%);
      margin-left: -320px;
    }

    .side-panel-header {
      padding: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .side-panel-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
    }

    .slide-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      list-style: none;
    }

    .slide-list::-webkit-scrollbar {
      width: 6px;
    }
    .slide-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .slide-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }
    .slide-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.2);
    }

    .slide-item {
      padding: 14px 18px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .slide-item:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.05);
    }

    .slide-item.active {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
    }

    .slide-num {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      color: var(--primary);
      width: 24px;
      font-size: 14px;
    }

    .slide-item.active .slide-num {
      text-shadow: 0 0 8px var(--primary-glow);
    }

    .slide-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .slide-item.active .slide-name {
      color: #ffffff;
    }

    /* Presentation Screen Canvas */
    .presentation-canvas {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      position: relative;
    }

    .viewport {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16/9;
      background: #000000;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px var(--glass-border);
      position: relative;
      overflow: hidden;
    }

    .slide-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: transform var(--transition-speed) cubic-bezier(0.645, 0.045, 0.355, 1), opacity var(--transition-speed) ease;
      z-index: 1;
    }

    /* Custom slide transitions */
    .slide-frame.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0) scale(1);
      z-index: 2;
    }

    /* Slide Left transition */
    .slide-frame.slide-out-left {
      transform: translateX(-100%) scale(0.95);
      opacity: 0;
    }
    .slide-frame.slide-in-right {
      transform: translateX(100%) scale(1.05);
      opacity: 0;
    }

    /* Slide Right transition */
    .slide-frame.slide-out-right {
      transform: translateX(100%) scale(0.95);
      opacity: 0;
    }
    .slide-frame.slide-in-left {
      transform: translateX(-100%) scale(1.05);
      opacity: 0;
    }

    /* Controls Panel */
    .controls-overlay {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 800px;
      margin-top: 24px;
      padding: 16px 24px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      border-radius: 9999px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      z-index: 5;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-control {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 9999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .btn-control:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn-control.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #ffffff;
    }

    .btn-control.primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .slide-indicator {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 8px 18px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slide-indicator span {
      color: var(--primary);
    }

    /* Auto-play Timer Indicator */
    .timer-ring {
      width: 20px;
      height: 20px;
      position: relative;
      display: none;
    }
    .timer-ring.active {
      display: block;
    }
    .timer-ring svg {
      width: 20px;
      height: 20px;
      transform: rotate(-90deg);
    }
    .timer-ring circle {
      fill: none;
      stroke-width: 3;
    }
    .timer-ring-bg {
      stroke: rgba(255,255,255,0.1);
    }
    .timer-ring-fg {
      stroke: var(--primary);
      stroke-dasharray: 56.5;
      stroke-dashoffset: 56.5;
      transition: stroke-dashoffset 0.1s linear;
    }

    /* Fullscreen Progress Bar */
    .progress-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      z-index: 10;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--primary);
      box-shadow: 0 0 8px var(--primary);
      transition: width 0.3s ease;
    }

    /* Presenter Floating Tip */
    .presenter-tip {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.6;
      pointer-events: none;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      z-index: 20;
      display: flex;
      flex-direction: column;

    /* Fullscreen Mode Styling */
    body.fullscreen-mode {
      overflow: hidden !important;

    body.fullscreen-mode .viewport {
      position: fixed !important;

    /* Show floating controls in fullscreen mode and native fullscreen */

    /* Soft hover effect on touch / mouse */

    /* Active hover state */

    /* --- Responsive Overrides --- */

  <!-- Bottom Page-wide Progress Bar -->
  <div class="progress-bar-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <script>
    // State Variables
    let slides = [];
    let currentIdx = 0;
    let isTransitioning = false;
    let autoPlayInterval = null;
    let autoPlayDuration = 8000; // 8 seconds per slide in autoplay
    let timerStart = 0;
    let timerElapsed = 0;
    let timerFrameId = null;

    // Elements
    let iframeCurrent = document.getElementById('iframe-current');
    let iframeNext = document.getElementById('iframe-next');
    const slideList = document.getElementById('slide-list');
    const loadingOverlay = document.getElementById('loading-overlay');
    const toggleSidebarBtn = document.getElementById('toggle-sidebar');
    const sidePanel = document.getElementById('side-panel');
    const togglePlayBtn = document.getElementById('toggle-play');
    const prevBtn = document.getElementById('prev-slide');
    const nextBtn = document.getElementById('next-slide');
    const currentNumSpan = document.getElementById('current-slide-num');
    const totalNumSpan = document.getElementById('total-slides-num');
    const progressBar = document.getElementById('progress-bar');
    const fullscreenBtn = document.getElementById('btn-fullscreen');
    const viewport = document.getElementById('viewport');
    const timerRing = document.getElementById('timer-ring');
    const timerRingFg = document.getElementById('timer-ring-fg');
    const floatingPrevBtn = document.getElementById('floating-prev');
    const floatingNextBtn = document.getElementById('floating-next');
    const floatingExitBtn = document.getElementById('floating-exit');

    // Initialize Presentation
    async function init() {
      try {
        // Embedded slides configuration to prevent CORS issues on file:// protocol
        slides = [
          { "index": 1, "title": "Special Proposal Cover" },
          { "index": 2, "title": "1. Executive Summary" },
          { "index": 3, "title": "2. Rationale (Part 1)" },
          { "index": 4, "title": "2. Rationale (Part 2)" },
          { "index": 5, "title": "3. Proposed Mandate (Part 1)" },
          { "index": 6, "title": "3. Proposed Mandate (Part 2)" },
          { "index": 7, "title": "4. Strategic Pillars" },
          { "index": 8, "title": "5. Strategic Advantages" },
          { "index": 9, "title": "6. Requested Recognition" },
          { "index": 10, "title": "7. Conclusion" },
          { "index": 11, "title": "8. References & Citations" }
        ];
        if (totalNumSpan) totalNumSpan.textContent = slides.length;
        
        // Collapse sidebar by default on smaller viewports
        if (window.innerWidth < 1024) {
          sidePanel.classList.add('collapsed');
          toggleSidebarBtn.innerHTML = '<span class="material-symbols-outlined">menu</span>';
        }

        renderSidebar();
        loadSlide(0);

        // Hide loader
        loadingOverlay.style.opacity = '0';
        setTimeout(() => loadingOverlay.style.display = 'none', 500);

      } catch (err) {
        console.error(err);
        document.querySelector('.loading-text').textContent = 'Error loading presentation slides.';
        document.querySelector('.spinner').style.display = 'none';
      }
    }

    // Render Side Panel List
    function renderSidebar() {
      slideList.innerHTML = '';
      slides.forEach((slide, index) => {
        const li = document.createElement('li');
        li.className = `slide-item ${index === 0 ? 'active' : ''}`;
        li.dataset.index = index;
        li.innerHTML = `
          <div class="slide-num">${String(index + 1).padStart(2, '0')}</div>
          <div class="slide-name" title="${slide.title}">${slide.title}</div>
        `;
        li.addEventListener('click', () => {
          if (index !== currentIdx) {
            goToSlide(index);
          }
        });
        slideList.appendChild(li);
      });
    }

    // Load static slide (without animations, for startup)
    function loadSlide(index) {
      currentIdx = index;
      const slide = slides[index];
      iframeCurrent.src = `slides/slide${String(slide.index).padStart(2, '0')}.html`;
      updateUI();
    }

    // Go to specific slide with horizontal transitions
    async function goToSlide(targetIdx) {
      if (isTransitioning) return;
      isTransitioning = true;
      resetAutoPlayTimer();

      const direction = targetIdx > currentIdx ? 'next' : 'prev';
      const currentSlide = slides[currentIdx];
      const targetSlide = slides[targetIdx];

      // Setup next iframe
      iframeNext.src = `slides/slide${String(targetSlide.index).padStart(2, '0')}.html`;

      // Wait briefly for content to load inside iframe
      await new Promise(resolve => {
        const checkLoad = () => {
          try {
            if (iframeNext.contentDocument && iframeNext.contentDocument.readyState === 'complete') {
              resolve();
            } else {
              setTimeout(checkLoad, 50);
            }
          } catch (e) {
            // Fallback for cross-origin security block (though they are local, it shouldn't occur)
            setTimeout(resolve, 300);
          }
        };
        checkLoad();
      });

      // Position target slide iframe outside the screen
      iframeNext.className = 'slide-frame';
      if (direction === 'next') {
        iframeNext.classList.add('slide-in-right');
      } else {
        iframeNext.classList.add('slide-in-left');
      }

      // Force layout recalculation
      iframeNext.offsetHeight;

      // Apply transition animations
      if (direction === 'next') {
        iframeCurrent.classList.add('slide-out-left');
        iframeNext.classList.remove('slide-in-right');
        iframeNext.classList.add('active');
      } else {
        iframeCurrent.classList.add('slide-out-right');
        iframeNext.classList.remove('slide-in-left');
        iframeNext.classList.add('active');
      }

      // Wait for transitions to finish
      setTimeout(() => {
        // Clean up previous frame
        iframeCurrent.className = 'slide-frame';
        iframeCurrent.src = 'about:blank';

        // Swap variables to update current/next roles
        const temp = iframeCurrent;
        iframeCurrent = iframeNext;
        iframeNext = temp;

        currentIdx = targetIdx;
        isTransitioning = false;
        updateUI();
        
        if (autoPlayInterval) {
          startAutoPlayTimer();
        }
      }, 600); // matches --transition-speed (0.6s)
    }

    // Update UI Status Indicators
    function updateUI() {
      if (currentNumSpan) currentNumSpan.textContent = currentIdx + 1;
      
      // Update sidebar items active state
      const items = slideList.querySelectorAll('.slide-item');
      items.forEach((item, index) => {
        if (index === currentIdx) {
          item.classList.add('active');
          // Scroll active item into view
          item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          item.classList.remove('active');
        }
      });

      // Update progress bar
      if (progressBar) {
        const progress = ((currentIdx + 1) / slides.length) * 100;
        progressBar.style.width = `${progress}%`;
      }

      // Disable/Enable buttons
      if (prevBtn) prevBtn.disabled = currentIdx === 0;
      if (nextBtn) nextBtn.disabled = currentIdx === slides.length - 1;
    }

    // Autoplay Controls
    function toggleAutoPlay() {
      if (autoPlayInterval) {
        stopAutoPlay();
      } else {
        startAutoPlay();
      }
    }

    function startAutoPlay() {
      togglePlayBtn.innerHTML = '<span class="material-symbols-outlined">pause</span>';
      togglePlayBtn.style.background = 'var(--primary)';
      togglePlayBtn.style.color = '#ffffff';
      if (timerRing) timerRing.classList.add('active');
      
      autoPlayInterval = setInterval(() => {
        if (currentIdx < slides.length - 1) {
          goToSlide(currentIdx + 1);
        } else {
          goToSlide(0); // Loop back
        }
      }, autoPlayDuration);

      startAutoPlayTimer();
    }

    function stopAutoPlay() {
      togglePlayBtn.innerHTML = '<span class="material-symbols-outlined">play_arrow</span>';
      togglePlayBtn.style.background = '';
      togglePlayBtn.style.color = '';
      if (timerRing) timerRing.classList.remove('active');
      
      clearInterval(autoPlayInterval);
      autoPlayInterval = null;
      
      resetAutoPlayTimer();
    }

    // Timer indicators
    function startAutoPlayTimer() {
      cancelAnimationFrame(timerFrameId);
      timerStart = Date.now();
      
      function tick() {
        const elapsed = Date.now() - timerStart;
        const percent = Math.min(elapsed / autoPlayDuration, 1);
        
        // 56.5 is the circumference of the svg circle (2 * PI * r)
        // r = 9 => 2 * 3.14159 * 9 = 56.54
        const offset = 56.5 - (percent * 56.5);
        if (timerRingFg) timerRingFg.style.strokeDashoffset = offset;
        
        if (percent < 1 && autoPlayInterval) {
          timerFrameId = requestAnimationFrame(tick);
        }
      }
      timerFrameId = requestAnimationFrame(tick);
    }

    function resetAutoPlayTimer() {
      cancelAnimationFrame(timerFrameId);
      if (timerRingFg) timerRingFg.style.strokeDashoffset = 56.5;
    }

    // Event Listeners
    if (prevBtn) {
      prevBtn.addEventListener('click', () => {
        if (currentIdx > 0) goToSlide(currentIdx - 1);
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        if (currentIdx < slides.length - 1) goToSlide(currentIdx + 1);
      });
    }

    function handlePrev(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      if (currentIdx > 0) goToSlide(currentIdx - 1);
    }

    function handleNext(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      if (currentIdx < slides.length - 1) goToSlide(currentIdx + 1);
    }

    function handleExit(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      exitFullscreenPresentation();
    }

    floatingPrevBtn.addEventListener('click', handlePrev);
    floatingPrevBtn.addEventListener('touchstart', handlePrev, { passive: false });
    floatingPrevBtn.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });

    floatingNextBtn.addEventListener('click', handleNext);
    floatingNextBtn.addEventListener('touchstart', handleNext, { passive: false });
    floatingNextBtn.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });

    floatingExitBtn.addEventListener('click', handleExit);
    floatingExitBtn.addEventListener('touchstart', handleExit, { passive: false });
    floatingExitBtn.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });

    togglePlayBtn.addEventListener('click', toggleAutoPlay);

    toggleSidebarBtn.addEventListener('click', () => {
      sidePanel.classList.toggle('collapsed');
      if (sidePanel.classList.contains('collapsed')) {
        toggleSidebarBtn.innerHTML = '<span class="material-symbols-outlined">menu</span>';
      } else {
        toggleSidebarBtn.innerHTML = '<span class="material-symbols-outlined">menu_open</span>';
      }
    });

    function enterFullscreenPresentation() {
      document.body.classList.add('fullscreen-mode');
      fullscreenBtn.innerHTML = '<span class="material-symbols-outlined">fullscreen_exit</span>';
      
      // Request native fullscreen on viewport
      if (viewport.requestFullscreen) {
        viewport.requestFullscreen().catch(err => {
          console.warn(`Native fullscreen request failed: ${err.message}`);
        });
      } else if (viewport.webkitRequestFullscreen) { /* Safari / iOS */
        viewport.webkitRequestFullscreen();
      }
    }

    function exitFullscreenPresentation() {
      document.body.classList.remove('fullscreen-mode');
      fullscreenBtn.innerHTML = '<span class="material-symbols-outlined">fullscreen</span>';
      
      // Exit native fullscreen if currently active
      if (document.fullscreenElement === viewport || document.webkitFullscreenElement === viewport) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    }

    function toggleFullscreenPresentation() {
      const isFullscreen = document.body.classList.contains('fullscreen-mode') || 
                          document.fullscreenElement === viewport || 
                          document.webkitFullscreenElement === viewport;
      if (isFullscreen) {
        exitFullscreenPresentation();
      } else {
        enterFullscreenPresentation();
      }
    }

    function handleFullscreenChange() {
      const nativeFullscreen = document.fullscreenElement === viewport || document.webkitFullscreenElement === viewport;
      if (!nativeFullscreen && !document.fullscreenElement && !document.webkitFullscreenElement) {
        document.body.classList.remove('fullscreen-mode');
        fullscreenBtn.innerHTML = '<span class="material-symbols-outlined">fullscreen</span>';
      }
    }

    fullscreenBtn.addEventListener('click', toggleFullscreenPresentation);
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

    // Touch Swipe Gestures
    let touchStartX = 0;
    let touchStartY = 0;
    let touchEndX = 0;
    let touchEndY = 0;

    viewport.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    viewport.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      touchEndY = e.changedTouches[0].screenY;
      handleSwipe();
    }, { passive: true });

    function handleSwipe() {
      const diffX = touchEndX - touchStartX;
      const diffY = touchEndY - touchStartY;
      
      // Ensure horizontal swipe is dominant and exceeds minimum delta of 50px
      if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
        if (diffX > 0) {
          if (currentIdx > 0) goToSlide(currentIdx - 1);
        } else {
          if (currentIdx < slides.length - 1) goToSlide(currentIdx + 1);
        }
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        if (currentIdx < slides.length - 1) goToSlide(currentIdx + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        if (currentIdx > 0) goToSlide(currentIdx - 1);
      }
    });

    // Bind cover slide action buttons inside iframes
    function bindIframeButtons(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc) return;
        
        const exploreBtn = doc.getElementById('explore-data-btn');
        if (exploreBtn) {
          exploreBtn.addEventListener('click', (e) => {
            e.preventDefault();
            goToSlide(3); // Slide 4: Bamboo Resources & Species (index 3)
          });
        }
        
        const methodologyBtn = doc.getElementById('view-methodology-btn');
        if (methodologyBtn) {
          methodologyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            goToSlide(1); // Slide 2: Executive Summary & Introduction (index 1)
          });
        }
      } catch (err) {
        console.warn("Could not bind iframe buttons:", err);
      }
    }

    // Attach iframe load listeners to bind slide cover buttons
    iframeCurrent.addEventListener('load', () => bindIframeButtons(iframeCurrent));
    iframeNext.addEventListener('load', () => bindIframeButtons(iframeNext));

    // Run Initialization
    init();

  </script>
</body>
</html>
